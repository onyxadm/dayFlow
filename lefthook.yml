pre-commit:
  jobs:
    - run: pnpm --filter @dayflow/core run check:css

    - run: pnpm format
      stage_fixed: true

    - run: pnpm lint:fix
      glob:
        - '*.js'
        - '*.jsx'
        - '*.ts'
        - '*.tsx'
        - '*.json'
        - '*.jsonc'
        - '*.css'
        - '*.md'
      stage_fixed: true

    - glob: 'website/**/*'
      run: pnpm --dir website run build
